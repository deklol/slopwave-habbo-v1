      <script>
      (function() {
        document.documentElement.classList.add("runtime-game-only");
        var params = new URLSearchParams(window.location.search);
        var changed = false;
        if (!params.has("version")) {
          params.set("version", "release1");
          changed = true;
        }
        if (!params.has("manifest") && !params.has("source")) {
          params.set("manifest", "projectorrays");
          changed = true;
        }
        if (!params.has("standalone")) {
          params.set("standalone", "1");
          changed = true;
        }
        if (!params.has("serverWs")) {

          params.set("serverWs", wsProtocol + "//" + window.location.host + "/ws");
          changed = true;
        }
        if (changed) {
          var nextUrl = window.location.pathname + "?" + params.toString() + window.location.hash;
          window.history.replaceState(null, "", nextUrl);
        }
      })();
